# SonarQube / SonarCloud configuration for the Peaches N' Plushies static site.
#
# Run locally with:
#   docker run --rm -e SONAR_HOST_URL="https://sonarcloud.io" \
#     -e SONAR_TOKEN="$SONAR_TOKEN" -v "$PWD:/usr/src" sonarsource/sonar-scanner-cli
#
# Or in CI (GitHub Actions): use the official sonarqube-scan-action.

sonar.projectKey=peachesnplushies-website
sonar.projectName=Peaches N' Plushies Website
sonar.projectVersion=1.0.0

# What to scan
sonar.sources=.
sonar.sourceEncoding=UTF-8

# What NOT to scan — vendor, generated, binaries, docs that aren't code
sonar.exclusions=\
  Photos/**,\
  Assets/**,\
  node_modules/**,\
  .vercel/**,\
  config.js,\
  sanity/schemas/**

# Sanity schema files are just static data — no need to lint them
sonar.coverage.exclusions=**/*

# Languages we expect (helps Sonar pick the right analyzers)
sonar.javascript.environments=browser,node
